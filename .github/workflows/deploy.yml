name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/application-web
            git pull origin main
            docker build -t mon-app-vue .
            docker stop mon-app-container || true
            docker rm mon-app-container || true
            docker run -d --name mon-app-container -p 80:80 mon-app-vue